<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SLAMET MULYONO</title>

<!-- ===== IMPORT FONT ALADIN ===== -->
<link href="https://fonts.googleapis.com/css2?family=Aladin&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.1.1/dist/tesseract.min.js"></script>

<style>
body{
  font-family:'Aladin', cursive;
  background-image:url("https://i.pinimg.com/736x/b4/87/25/b487250656bbbaabc883fbb57244ca7d.jpg");
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  text-align:center;
  padding:40px;
  margin:0;
}

/* ===== PANEL UTAMA GLASS ===== */
.container{
  max-width:750px;
  margin:400px auto 0 auto;
  padding:35px;
  border-radius:15px;
  background: rgba(0,0,0,0.25);
  backdrop-filter:blur(10px);
  display:flex;
  flex-direction:column;
  align-items:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

h1{
  margin-bottom:10px;
  letter-spacing:2px;
  font-size:32px;
}

/* ===== TEKS WARNA-WARNI ===== */
.rainbow-text span{
  font-weight:bold;
  display:inline-block;
  font-family:'Aladin', cursive;
}

/* ===== AYAT ALKITAB ===== */
.verse{
  margin-bottom:20px;
  font-size:15px;
  opacity:0.9;
  color:white; /* tetap putih */
  font-family:'Aladin', cursive;
}

/* ===== TEXTAREA ===== */
textarea{
  width:60%;
  height:150px;
  margin-top:20px;
  font-size:16px;
  padding:10px;
  border-radius:8px;
  border:none;
  resize:none;
  background:rgba(255,255,255,0.3);
  color:black;
  font-family: 'Courier New', monospace;
}

button{
  padding:10px 25px;
  margin-top:15px;
  cursor:pointer;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:white;
  margin:3px;
}

button:hover{
  background:#2563eb;
}

/* ===== NAMA BAWAH ===== */
.footer-name{
  margin-top:30px;
  font-size:18px;
  font-weight:bold;
  letter-spacing:1px;
  opacity:0.9;
}
</style>
</head>

<body>

<div class="container">

<h1 class="rainbow-text" id="title-text">SLAMET MULYONO</h1>

<div class="verse" id="verse-text">
Orang-orang yang beriman dan hati mereka menjadi tenteram dengan mengingat Allah. Ingatlah, dengan mengingat Allah, hati menjadi tenteram.  
<b>QS. Ar-Ra’d 13:28</b>
</div>

<input type="file" id="imageInput">
<br>
<button onclick="copyText()">Copy Text</button>

<textarea id="result" placeholder="Sini Guyssss hehehe"></textarea>

</div>

<!-- ===== NAMA BAWAH ===== -->
<div class="footer-name rainbow-text" id="footer-name">Mett</div>

<script>
/* ===== WARNA-WARNI SETIAP HURUF ===== */
function makeRainbow(elementId){
  const el = document.getElementById(elementId);
  const text = el.innerText;
  const colors = ['#FF0000','#FF7F00','#FFFF00','#00FF00','#0000FF','#4B0082','#9400D3'];
  let html = '';
  for(let i=0; i<text.length; i++){
    const char = text[i];
    const color = colors[i % colors.length];
    html += '<span style="color:'+color+'">'+char+'</span>';
  }
  el.innerHTML = html;
}

// Terapkan ke judul dan nama bawah saja
makeRainbow('title-text');
makeRainbow('footer-name');

/* ===== OCR FUNCTION ===== */
function runOCR(image){
  Tesseract.recognize(
    image,
    'eng'
  ).then(({ data: { text } }) => {
    let cleaned = text.replace(/\n+/g,"").replace(/\s+/g,"").trim();
    const resultArea = document.getElementById("result");
    resultArea.value = cleaned;
    
    resultArea.style.backgroundColor = "rgba(255,255,255,0.3)";
    resultArea.style.color = "black";
  })
}

/* ===== UPLOAD GAMBAR ===== */
document.getElementById('imageInput').addEventListener('change',function(){
  const file = this.files[0];
  runOCR(file);
})

/* ===== PASTE SCREENSHOT ===== */
document.addEventListener('paste',function(event){
  const items = event.clipboardData.items;
  for (let i = 0; i < items.length; i++) {
    if (items[i].type.indexOf("image") !== -1) {
      const blob = items[i].getAsFile();
      runOCR(blob);
    }
  }
})

/* ===== COPY TEXT ===== */
function copyText(){
  const textarea = document.getElementById("result");
  textarea.select();
  document.execCommand("copy");
}
</script>

</body>
</html>
